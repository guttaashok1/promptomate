name: Promptomate Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  promptomate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tests with auto-triage
        id: promptomate
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run dev -- ci --out triage-report.md

      - name: Upload triage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: triage-report
          path: triage-report.md
          if-no-files-found: warn

      - name: Upsert PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('triage-report.md')) {
              core.info('No triage-report.md to post');
              return;
            }
            const body = fs.readFileSync('triage-report.md', 'utf8');
            const MARKER = '<!-- promptomate-report -->';
            const payload = `${MARKER}\n${body}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: payload,
              });
              core.info(`Updated comment ${existing.id}`);
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: payload,
              });
              core.info('Created new comment');
            }

      - name: Fail build if any unrecovered failure or real bug
        if: steps.promptomate.outcome == 'failure'
        run: |
          echo "::error::Promptomate ci exited non-zero. See the PR comment or the uploaded triage-report artifact."
          exit 1
