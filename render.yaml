services:
  - type: web
    name: promptomate
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright npx playwright install --with-deps chromium-headless-shell
    startCommand: export PLAYWRIGHT_BROWSERS_PATH=/opt/render/.cache/ms-playwright && npx playwright install chromium-headless-shell && node dist/cli.js serve
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/.cache/ms-playwright
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROMPTOMATE_AUTH_TOKEN
        sync: false
