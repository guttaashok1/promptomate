services:
  - type: web
    name: promptomate
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.pw-browsers npx playwright install chromium-headless-shell
    startCommand: node --max-old-space-size=180 dist/cli.js serve
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.pw-browsers
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROMPTOMATE_AUTH_TOKEN
        sync: false
      - key: SAUCE_PASSWORD
        value: secret_sauce
