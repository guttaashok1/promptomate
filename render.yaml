services:
  - type: web
    name: promptomate
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build && npx playwright install chromium-headless-shell
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PROMPTOMATE_AUTH_TOKEN
        sync: false
