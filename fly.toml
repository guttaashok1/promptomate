# Fly.io configuration for promptomate
# Deploy with: fly launch (first time) or fly deploy (subsequent)
# Docs: https://fly.io/docs/

app = "promptomate"
primary_region = "sea"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3535"

[http_service]
  internal_port = 3535
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    timeout = "5s"
    method = "GET"
    path = "/health"

# 1 GB persistent volume for saved tests + run history
[[mounts]]
  source = "promptomate_data"
  destination = "/data"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
